*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{

height:100%;

.custom-watermark{

/* --- Updated Modern Blocker Styles --- */
.block-overlay{
position:fixed;
inset:0;
z-index:99999;
display:flex;
align-items:center;
justify-content:center;

}

.block-box{

width:90%;
background:rgba(20, 20, 20, 0.95);
border-radius:16px;
border:1px solid rgba(255, 255, 255, 0.1);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

.block-title{
font-size:42px;
font-weight:800;
color:#ffffff;
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:20px;
text-shadow:0 0 10px rgba(255, 0, 0, 0.3);

.block-sub{

.block-note{ display: none; }

@media(max-width:700px){
.custom-watermark{font-size:9px;top:60%;left:16%}

.block-box{padding:25px}

}
